workflows:
  ios-workflow:
    name: Autokhidma Wash — iOS Build
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: ma.autokhidma.wash
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
      node: 18
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: "mobile-apps"
          include: true
    scripts:
      - name: Install Node dependencies
        script: npm install
      - name: Capacitor sync
        script: npx cap sync ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
